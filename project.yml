name: GlassMark
options:
  bundleIdPrefix: com.glassmark
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.0"
configs:
  Debug: debug
  Release: release
  # Direct (notarized) distribution build — includes the in-app updater.
  ReleaseDirect: release
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true
packages: {}
targets:
  GlassMark:
    type: application
    platform: macOS
    sources:
      - path: GlassMark
        excludes:
          - "glassmark-iconset.icon"
      - path: GlassMark/glassmark-iconset.icon
        type: file
    entitlements:
      path: GlassMark/GlassMark.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recurse.glassmark
        PRODUCT_NAME: Glassmark
        PRODUCT_MODULE_NAME: GlassMark
        INFOPLIST_KEY_CFBundleDisplayName: Glassmark
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Glassmark. Released under the MIT License."
        ASSETCATALOG_COMPILER_APPICON_NAME: glassmark-iconset
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
      configs:
        # DIRECT_DISTRIBUTION gates the in-app updater. It's on for Debug (so the
        # code compiles and is unit-testable) and for ReleaseDirect (notarized
        # direct download), but OFF for Release — the App Store build must not
        # contain any self-update mechanism.
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG DIRECT_DISTRIBUTION
        # Preselect the Recurse LTD team for App Store archiving. Release-only so
        # local Debug/test builds keep signing ad-hoc (there's no Recurse LTD
        # development cert on the machine, only the distribution one).
        Release:
          DEVELOPMENT_TEAM: R57FJUULSB
        ReleaseDirect:
          DEVELOPMENT_TEAM: R57FJUULSB
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DIRECT_DISTRIBUTION
    info:
      path: GlassMark/Resources/Info.plist
      properties:
        CFBundleDisplayName: Glassmark
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSPrincipalClass: NSApplication
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.productivity
  GlassMarkTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GlassMarkTests
    dependencies:
      - target: GlassMark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recurse.glassmark.tests
        GENERATE_INFOPLIST_FILE: true
        # The host product is Glassmark.app (PRODUCT_NAME), not the target name.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Glassmark.app/Contents/MacOS/Glassmark"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  GlassMark:
    build:
      targets:
        GlassMark: all
        GlassMarkTests: [test]
    test:
      targets:
        - GlassMarkTests
    run:
      config: Debug
    archive:
      # App Store archive uses Release (no updater). Direct releases are built
      # with -configuration ReleaseDirect via script/release.sh.
      config: Release
